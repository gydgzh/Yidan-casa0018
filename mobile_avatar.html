<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>FaceMocap Mobile</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #0a0a0c; color: #fff;
    font: 13px/1.4 -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }
  #scene { position: fixed; inset: 0; z-index: 1; }
  #scene canvas { display: block; width: 100%; height: 100%; }
  #cam {
    position: fixed;
    bottom: max(12px, env(safe-area-inset-bottom));
    right: 12px;
    width: 96px; height: 128px;
    object-fit: cover;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,.25);
    transform: scaleX(-1);
    z-index: 5; background: #000;
  }
  #hud {
    position: fixed; top: max(12px, env(safe-area-inset-top)); left: 12px;
    z-index: 10;
    background: rgba(0,0,0,.6); backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding: 10px 12px; border-radius: 12px;
    font: 11px/1.5 ui-monospace, Menlo, monospace;
    max-width: 70vw;
  }
  #hud b { color: #6cf; }
  #hud .ok{color:#6f6} #hud .bad{color:#f66} #hud .wait{color:#fc6} #hud .off{color:#888}
  #log {
    position: fixed; left: 12px; right: 12px;
    bottom: max(150px, env(safe-area-inset-bottom)); z-index: 10;
    background: rgba(0,0,0,.6); color: #ccc;
    padding: 8px 10px; border-radius: 10px;
    font: 10px/1.4 ui-monospace, Menlo, monospace;
    max-height: 120px; overflow-y: auto;
    white-space: pre-wrap; word-break: break-all;
    display: none;
  }
  #log.show { display: block; }
  #log .err { color: #f88; }
  #log .ok  { color: #8f8; }
  #action {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    z-index: 8; font-size: 64px; opacity: 0; pointer-events: none;
    text-shadow: 0 4px 14px rgba(0,0,0,.7);
    transition: opacity .15s;
  }
  #start {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: linear-gradient(160deg,#1a1a2e,#0a0a0c);
    text-align: center; padding: 24px;
  }
  #start h1 { font-weight: 600; font-size: 22px; margin: 0 0 8px; }
  #start p  { color: #aaa; margin: 0 0 24px; max-width: 320px; }
  #start button {
    appearance: none; border: none;
    background: #4a8fff; color: white;
    padding: 14px 36px; border-radius: 999px;
    font-size: 16px; font-weight: 600;
    box-shadow: 0 6px 24px rgba(74,143,255,.3);
  }
  #start button:disabled { background: #888; box-shadow: none; }
  #start .small { margin-top: 18px; font-size: 11px; opacity: .55; }
  #effects { position: fixed; inset: 0; pointer-events: none; z-index: 6; overflow: hidden; }
  .particle {
    position: absolute; font-size: 32px;
    animation: fly 1.4s ease-out forwards;
  }
  @keyframes fly {
    0%   { transform: translate(0,0) scale(.4); opacity: 0; }
    20%  { transform: translate(0,0) scale(1.0); opacity: 1; }
    100% { transform: translate(var(--dx),var(--dy)) scale(.6); opacity: 0; }
  }
  #toggleLog {
    position: fixed; left: 12px;
    bottom: max(110px, env(safe-area-inset-bottom));
    z-index: 11;
    background: rgba(0,0,0,.6); color: #ccc;
    border: 1px solid rgba(255,255,255,.15);
    padding: 4px 10px; border-radius: 999px;
    font: 11px ui-monospace, Menlo, monospace;
  }
</style>
</head>
<body>

<div id="scene"></div>
<video id="cam" autoplay muted playsinline webkit-playsinline></video>
<div id="effects"></div>
<div id="action"></div>
<div id="testbanner" style="display:none;position:fixed;top:0;left:0;right:0;z-index:50;background:#c93;color:#000;padding:8px 12px;font:12px ui-monospace,Menlo,monospace;text-align:center;font-weight:600">
  TEST MODE — flags: <span id="active-flags"></span> · 真实运行请去掉这些参数
</div>

<div id="hud">
  <div>cam: <span id="s-cam" class="wait">init</span> · mp: <span id="s-mp" class="wait">init</span></div>
  <div>avatar: <span id="s-av" class="wait">load</span> · action: <span id="s-ac" class="wait">load</span></div>
  <div>fps: <b id="s-fps">0</b> · frames: <b id="s-fr">0</b></div>
  <div>last bs: <span id="s-bs">-</span></div>
  <div>action: <b id="s-act">-</b> conf: <span id="s-conf">-</span></div>
</div>

<button id="toggleLog">日志</button>
<div id="log"></div>

<div id="start">
  <h1>FaceMocap Mobile</h1>
  <p>面部动作驱动虚拟人 · 全程在你设备上推理</p>
  <button id="btn-go">允许摄像头并开始</button>
  <div class="small" id="hint">tip: 第一次启动会下载 ~10MB（MediaPipe），耐心 5-10 秒</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

// ====== URL flags for diagnostics ======
const Q = new URLSearchParams(location.search);
const FLAG_CUBE = Q.has('cube');     // skip avatar, use proxy head
const FLAG_NOCAM = Q.has('nocam');   // skip camera + mp
const FLAG_DEBUG = Q.has('debug');   // open log panel by default
// Avatar URL chain — first one that loads wins. Drop to proxy head if all fail.
// You can override with ?avatar=<URL>.
const AVATAR_URLS = Q.get('avatar')
  ? [Q.get('avatar')]
  : [
      // 1) Local copy in your repo (best — never breaks). Run download_avatar.sh once.
      './models/avatar.glb',
      // 2) TalkingHead project — MIT licensed, female realistic GLB with ARKit morphs
      //    Source: https://github.com/met4citizen/TalkingHead (MIT)
      'https://cdn.jsdelivr.net/gh/met4citizen/TalkingHead@main/avatars/brunette.glb',
      'https://cdn.jsdelivr.net/gh/met4citizen/TalkingHead@main/avatars/blonde.glb',
      'https://cdn.jsdelivr.net/gh/met4citizen/TalkingHead@main/avatars/asian.glb',
    ];
// Action model — try same-origin /models first, fall back to nothing
const ACTION_MODEL_URL = Q.get('action') || './models/action_model/model.json';

// ====== tuning knobs (override via URL) ======
// Default gain 1.6 means MediaPipe values get amplified 1.6x and clamped [0,1].
// Most blendshapes need this because MP outputs conservative values.
const GAIN     = parseFloat(Q.get('gain'))     || 1.6;
const SMOOTH   = parseFloat(Q.get('smooth'))   || 0.35;  // 0 = no smoothing, 0.7 = sluggish
const HEAD_LERP= parseFloat(Q.get('headlerp')) || 0.45;  // 0..1, higher = snappier head
const HEAD_FLIP= (Q.get('headflip') || '').toLowerCase(); // e.g. 'y' or 'xy'
// Per-shape gain overrides — give expressive shapes extra punch
const GAIN_OVERRIDE = {
  jawOpen: 2.2,
  mouthSmileLeft: 2.0,  mouthSmileRight: 2.0,
  mouthFrownLeft: 2.0,  mouthFrownRight: 2.0,
  browInnerUp: 1.8,     browOuterUpLeft: 1.6, browOuterUpRight: 1.6,
  browDownLeft: 1.4,    browDownRight: 1.4,
  eyeBlinkLeft: 1.3,    eyeBlinkRight: 1.3,
  eyeWideLeft: 1.6,     eyeWideRight: 1.6,
  mouthFunnel: 2.0,     mouthPucker: 2.0,
  cheekSquintLeft: 1.5, cheekSquintRight: 1.5,
  noseSneerLeft: 1.6,   noseSneerRight: 1.6,
  tongueOut: 2.5,
};

// ====== logger ======
const logEl = document.getElementById('log');
function log(msg, cls='') {
  const t = new Date().toTimeString().slice(0,8);
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = `[${t}] ${msg}`;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
  console.log(msg);
}
window.addEventListener('error', e => log('ERR: ' + e.message, 'err'));
window.addEventListener('unhandledrejection', e => log('PROMISE: ' + (e.reason && e.reason.message || e.reason), 'err'));
document.getElementById('toggleLog').addEventListener('click', () => {
  logEl.classList.toggle('show');
});
if (FLAG_DEBUG) logEl.classList.add('show');

// Show prominent banner when running in any test mode
{
  const active = [];
  if (FLAG_CUBE)  active.push('cube (代理头)');
  if (FLAG_NOCAM) active.push('nocam (无摄像头)');
  if (active.length) {
    document.getElementById('active-flags').textContent = active.join(' + ');
    document.getElementById('testbanner').style.display = 'block';
  }
}

// ====== HUD ======
const stats = {
  cam:'init', mp:'init', avatar:'wait', action:'wait',
  fps:0, frames:0, lastBs:'-', lastAction:'-', lastConf:'-'
};
const $ = (id)=>document.getElementById(id);
function paintCls(el, v) {
  if (v==='ok') return 'ok';
  if (v==='fail'||v==='bad') return 'bad';
  if (v==='off') return 'off';
  return 'wait';
}
function paint() {
  $('s-cam').textContent = stats.cam; $('s-cam').className = paintCls(null, stats.cam);
  $('s-mp').textContent  = stats.mp;  $('s-mp').className  = paintCls(null, stats.mp);
  $('s-av').textContent  = stats.avatar; $('s-av').className= paintCls(null, stats.avatar);
  $('s-ac').textContent  = stats.action; $('s-ac').className= paintCls(null, stats.action);
  $('s-fps').textContent = stats.fps;
  $('s-fr').textContent  = stats.frames;
  $('s-bs').textContent  = stats.lastBs;
  $('s-act').textContent = stats.lastAction;
  $('s-conf').textContent= stats.lastConf;
}
setInterval(paint, 250);

// ====== Three.js scene ======
const sceneEl = $('scene');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
sceneEl.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color('#1a1a2e');
const camera = new THREE.PerspectiveCamera(28, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 1.55, 1.3);
camera.lookAt(0, 1.55, 0);

try {
  const pmrem = new THREE.PMREMGenerator(renderer);
  scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
} catch(e) { log('PMREM env skipped: ' + e.message); }
const dir = new THREE.DirectionalLight(0xffffff, 1.4);
dir.position.set(1.5, 2.5, 1.5); scene.add(dir);
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const rim = new THREE.DirectionalLight(0x88aaff, 0.6);
rim.position.set(-1.5, 1.5, -1.5); scene.add(rim);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ====== Avatar (real or proxy head) ======
const ARKIT_KEYS = [
  'browDownLeft','browDownRight','browInnerUp','browOuterUpLeft','browOuterUpRight',
  'cheekPuff','cheekSquintLeft','cheekSquintRight',
  'eyeBlinkLeft','eyeBlinkRight',
  'eyeLookDownLeft','eyeLookDownRight','eyeLookInLeft','eyeLookInRight',
  'eyeLookOutLeft','eyeLookOutRight','eyeLookUpLeft','eyeLookUpRight',
  'eyeSquintLeft','eyeSquintRight','eyeWideLeft','eyeWideRight',
  'jawForward','jawLeft','jawOpen','jawRight',
  'mouthClose','mouthDimpleLeft','mouthDimpleRight',
  'mouthFrownLeft','mouthFrownRight','mouthFunnel',
  'mouthLeft','mouthLowerDownLeft','mouthLowerDownRight',
  'mouthPressLeft','mouthPressRight','mouthPucker','mouthRight',
  'mouthRollLower','mouthRollUpper','mouthShrugLower','mouthShrugUpper',
  'mouthSmileLeft','mouthSmileRight','mouthStretchLeft','mouthStretchRight',
  'mouthUpperUpLeft','mouthUpperUpRight',
  'noseSneerLeft','noseSneerRight','tongueOut'
];
let morphTargets = []; // [{mesh, dict}]
let headBone = null;
let proxyHead = null; // { group, eyeL, eyeR, mouth, brow }

function buildProxyHead() {
  // Simple stylised low-poly head that reacts to a subset of ARKit blendshapes
  const g = new THREE.Group();
  g.position.set(0, 1.55, 0);
  const skin = new THREE.MeshStandardMaterial({ color: 0xf2c2a8, roughness:.6, metalness:.0 });
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.13, 32, 32), skin);
  g.add(head);
  const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.018, 16, 16),
                              new THREE.MeshStandardMaterial({color:0x222}));
  eyeL.position.set(-0.05, 0.025, 0.115); g.add(eyeL);
  const eyeR = eyeL.clone(); eyeR.position.x = 0.05; g.add(eyeR);
  const browL = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.008, 0.01),
                               new THREE.MeshStandardMaterial({color:0x442211}));
  browL.position.set(-0.05, 0.06, 0.115); g.add(browL);
  const browR = browL.clone(); browR.position.x = 0.05; g.add(browR);
  const mouth = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.012, 0.01),
                               new THREE.MeshStandardMaterial({color:0x551122}));
  mouth.position.set(0, -0.05, 0.115); g.add(mouth);
  scene.add(g);
  proxyHead = { group:g, eyeL, eyeR, browL, browR, mouth, _baseEyeY:0.025, _baseMouthY:-0.05 };
}

function tryLoadOne(url) {
  return new Promise((resolve, reject) => {
    const loader = new GLTFLoader();
    loader.load(url, (gltf) => resolve(gltf),
      undefined,
      (err) => reject(err));
  });
}

async function loadAvatar() {
  if (FLAG_CUBE) {
    log('FLAG_CUBE → using proxy head');
    buildProxyHead();
    stats.avatar = 'proxy';
    return;
  }
  for (const url of AVATAR_URLS) {
    log('trying: ' + url);
    try {
      const gltf = await tryLoadOne(url);
      const root = gltf.scene;
      const allBones = [];
      root.traverse(o => {
        if (o.isMesh && o.morphTargetDictionary) {
          morphTargets.push({ mesh:o, dict:o.morphTargetDictionary });
        }
        if (o.isBone) allBones.push(o.name);
      });
      // Head bone detection: prefer exact match, fall back to fuzzy contains.
      const exactRe = /^(mixamorig)?Head$|Head_M$|^Head$/i;
      headBone = allBones.map(n => {
        let b = null; root.traverse(o => { if (o.isBone && o.name === n) b = o; });
        return b;
      }).find(b => b && exactRe.test(b.name));
      if (!headBone) {
        root.traverse(o => {
          if (!headBone && o.isBone && /head/i.test(o.name) && !/end/i.test(o.name)) {
            headBone = o;
          }
        });
      }
      scene.add(root);
      log(`avatar OK · ${url.split('/').pop()} · morphs=${morphTargets.length} · bones=${allBones.length} · head=${headBone?.name || 'NONE'}`, 'ok');
      stats.avatar = morphTargets.length ? 'ok' : 'no-morphs';
      return;
    } catch (err) {
      log('  failed: ' + (err.message || err), 'err');
    }
  }
  log('all avatar URLs failed → proxy head', 'err');
  buildProxyHead();
  stats.avatar = 'proxy';
}

function applyBlendshapes(bs) {
  if (morphTargets.length) {
    for (const { mesh, dict } of morphTargets) {
      for (const k of ARKIT_KEYS) {
        const i = dict[k]; if (i == null) continue;
        const raw = bs[k]; if (raw == null) continue;
        const g = GAIN_OVERRIDE[k] ?? GAIN;
        const target = Math.max(0, Math.min(1, raw * g));
        const cur = mesh.morphTargetInfluences[i] || 0;
        // exponential smoothing: SMOOTH=0 → instant, SMOOTH=0.7 → very smooth
        mesh.morphTargetInfluences[i] = cur + (target - cur) * (1 - SMOOTH);
      }
    }
  } else if (proxyHead) {
    // simple driving for the proxy head
    const blinkL = bs.eyeBlinkLeft ?? 0;
    const blinkR = bs.eyeBlinkRight ?? 0;
    proxyHead.eyeL.scale.y = Math.max(0.05, 1 - blinkL);
    proxyHead.eyeR.scale.y = Math.max(0.05, 1 - blinkR);
    const browUp = (bs.browInnerUp ?? 0);
    proxyHead.browL.position.y = 0.06 + browUp * 0.015;
    proxyHead.browR.position.y = 0.06 + browUp * 0.015;
    const jaw = bs.jawOpen ?? 0;
    proxyHead.mouth.scale.y = 1 + jaw * 4;
    proxyHead.mouth.position.y = proxyHead._baseMouthY - jaw * 0.015;
    const smile = ((bs.mouthSmileLeft ?? 0) + (bs.mouthSmileRight ?? 0)) / 2;
    proxyHead.mouth.scale.x = 1 + smile * 0.6;
    proxyHead.mouth.material.color.setHSL(0.95, 0.5, 0.25 + smile*0.15);
  }
}

// ====== MediaPipe (skipped if FLAG_NOCAM) ======
let landmarker = null;
async function initMP() {
  if (FLAG_NOCAM) { stats.mp = 'off'; log('FLAG_NOCAM → MP skipped'); return; }
  log('loading MediaPipe vision_bundle…');
  // import the bundle dynamically to keep top-level import error-free
  const mp = await import(
    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/vision_bundle.mjs');
  const fileset = await mp.FilesetResolver.forVisionTasks(
    'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.9/wasm');
  landmarker = await mp.FaceLandmarker.createFromOptions(fileset, {
    baseOptions: {
      modelAssetPath:
        'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
      delegate: 'GPU'
    },
    outputFaceBlendshapes: true,
    outputFacialTransformationMatrixes: true,
    runningMode: 'VIDEO',
    numFaces: 1
  });
  stats.mp = 'ok';
  log('MediaPipe ready', 'ok');
}

// ====== camera ======
const video = $('cam');
async function initCamera() {
  if (FLAG_NOCAM) { stats.cam = 'off'; log('FLAG_NOCAM → cam skipped'); return; }
  log('requesting camera…');
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user', width: 640, height: 480 },
    audio: false
  });
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
  await video.play();
  stats.cam = 'ok';
  log('camera ready', 'ok');
}

// ====== effects ======
const ACTION_LABELS = ['neutral','wink_left','wink_right','smile_big',
                       'surprise','frown','mouth_o','tongue_out'];
const ACTION_EMOJI  = ['','😉←','😉→','😄','😮','☹️','😯','😝'];
function spawnEffect(label) {
  const idx = ACTION_LABELS.indexOf(label);
  if (idx <= 0) return;
  const emoji = ACTION_EMOJI[idx] || '✨';
  const big = $('action');
  big.textContent = emoji;
  big.style.opacity = 1;
  setTimeout(() => big.style.opacity = 0, 600);
  const layer = $('effects');
  for (let i = 0; i < 8; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = emoji;
    p.style.left = (50 + (Math.random()*40-20)) + 'vw';
    p.style.top  = (50 + (Math.random()*30-15)) + 'vh';
    p.style.setProperty('--dx', (Math.random()*200-100) + 'px');
    p.style.setProperty('--dy', (-200 - Math.random()*200) + 'px');
    layer.appendChild(p);
    setTimeout(() => p.remove(), 1500);
  }
}

// ====== action recognition (LSTM, optional) ======
let actionModel = null;
const window30 = []; const VOTE_WINDOW = 2; let voteHistory = []; let lastTriggerAt = 0;
const CONF_THRESHOLD = 0.5; const COOLDOWN_MS = 500;
const WINDOW_LEN = 30;

async function initAction() {
  try {
    log('loading TFJS…');
    await new Promise((res, rej) => {
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js';
      s.onload = res; s.onerror = rej; document.head.appendChild(s);
    });
    log('loading action model: ' + ACTION_MODEL_URL);
    actionModel = await tf.loadLayersModel(ACTION_MODEL_URL);
    stats.action = 'ok';
    log('action model OK', 'ok');
  } catch (e) {
    stats.action = 'off';
    log('action model unavailable (effects disabled): ' + (e.message||e));
  }
}

let inferEvery = 6, inferTick = 0;
let inferBusy = false;            // guard against concurrent predictions
let inferErrorCount = 0;          // disable model if it keeps failing

function maybeInfer(bs) {
  if (!actionModel || inferBusy) return;
  const row = ARKIT_KEYS.map(k => bs[k] ?? 0);
  window30.push(row);
  if (window30.length > WINDOW_LEN) window30.shift();
  if (window30.length < WINDOW_LEN) return;
  if (++inferTick % inferEvery !== 0) return;

  inferBusy = true;
  try {
    // tf.tidy guarantees every tensor created inside is disposed.
    // dataSync() returns a TypedArray (not a tensor) so it's safe to leak out.
    const data = tf.tidy(() => {
      const x = tf.tensor3d([window30]);
      let y = actionModel.predict(x);
      if (Array.isArray(y)) y = y[0];
      return y.dataSync();
    });
    let bestI = 0, bestV = 0;
    for (let i = 0; i < data.length; i++) if (data[i] > bestV) { bestV = data[i]; bestI = i; }
    const label = ACTION_LABELS[bestI] || '?';
    stats.lastAction = label; stats.lastConf = bestV.toFixed(2);
    voteHistory.push(label);
    if (voteHistory.length > VOTE_WINDOW) voteHistory.shift();
    const allSame = voteHistory.length === VOTE_WINDOW
                    && voteHistory.every(x => x === label);
    const now = performance.now();
    if (allSame && bestV > CONF_THRESHOLD && now - lastTriggerAt > COOLDOWN_MS
        && label !== 'neutral') {
      lastTriggerAt = now;
      spawnEffect(label);
    }
  } catch (e) {
    inferErrorCount++;
    log(`infer err #${inferErrorCount}: ${e.message||e}`, 'err');
    if (inferErrorCount > 5) {
      log('too many infer errors → disabling action model', 'err');
      actionModel = null;
      stats.action = 'off';
    }
  } finally {
    inferBusy = false;
  }
}

// ====== main loop ======
let lastTs = 0, frameStart = performance.now(), frameCount = 0;
let lastSuccessfulFrame = performance.now();
let loopErrorCount = 0;
function fakeAnimate() {
  if (proxyHead) {
    proxyHead.group.rotation.y = Math.sin(performance.now()/1000) * 0.3;
  }
}

function loop() {
  // SAFETY: every path through this function MUST end by scheduling the next RAF.
  // One unhandled exception inside the body used to silently kill the loop and
  // freeze the avatar after a few seconds. Now we wrap and always schedule.
  try {
    if (!FLAG_NOCAM && video.readyState >= 2 && landmarker && !video.paused) {
      // MediaPipe needs a strictly-increasing INTEGER timestamp.
      const ts = Math.max(lastTs + 1, Math.floor(performance.now()));
      lastTs = ts;
      let r = null;
      try {
        r = landmarker.detectForVideo(video, ts);
      } catch (e) {
        loopErrorCount++;
        log(`detectForVideo err #${loopErrorCount}: ${e.message||e}`, 'err');
      }
      if (r && r.faceBlendshapes && r.faceBlendshapes.length) {
        const cats = r.faceBlendshapes[0].categories;
        const bs = {};
        for (const c of cats) bs[c.categoryName] = c.score;
        try { applyBlendshapes(bs); }
        catch (e) { log('applyBs err: ' + e.message, 'err'); }
        stats.frames++;
        lastSuccessfulFrame = performance.now();
        const ks = Object.keys(bs);
        stats.lastBs = ks.slice(0,3).join(',');
        // fire-and-forget — never await inside RAF, never let infer kill the loop
        try { maybeInfer(bs); }
        catch (e) { log('infer-outer err: ' + e.message, 'err'); }
        // head pose
        if (r.facialTransformationMatrixes && r.facialTransformationMatrixes[0]) {
          try {
            const m = r.facialTransformationMatrixes[0].data;
            const mat = new THREE.Matrix4().fromArray(m);
            const targetQ = new THREE.Quaternion().setFromRotationMatrix(mat);
            if (HEAD_FLIP) {
              const e = new THREE.Euler().setFromQuaternion(targetQ, 'YXZ');
              if (HEAD_FLIP.includes('x')) e.x = -e.x;
              if (HEAD_FLIP.includes('y')) e.y = -e.y;
              if (HEAD_FLIP.includes('z')) e.z = -e.z;
              targetQ.setFromEuler(e);
            }
            if (headBone) headBone.quaternion.slerp(targetQ, HEAD_LERP);
            else if (proxyHead) proxyHead.group.quaternion.slerp(targetQ, HEAD_LERP);
          } catch (e) { log('headpose err: ' + e.message, 'err'); }
        }
      }
      frameCount++;
      const now = performance.now();
      if (now - frameStart > 1000) {
        stats.fps = frameCount; frameCount = 0; frameStart = now;
      }
      // watchdog: face frames stalled for 3s → try to wake video
      if (now - lastSuccessfulFrame > 3000 && stats.frames > 0) {
        log('watchdog: no face frames for 3s — attempting recovery', 'err');
        lastSuccessfulFrame = now; // throttle the warning
        if (video.paused) video.play().catch(()=>{});
      }
    } else {
      fakeAnimate();
    }
    renderer.render(scene, camera);
  } catch (e) {
    loopErrorCount++;
    log(`loop err #${loopErrorCount}: ${e.message||e}`, 'err');
  }
  // ALWAYS schedule the next frame, regardless of any error above.
  requestAnimationFrame(loop);
}

// Resume video stream when tab becomes visible again.
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && video && video.paused) {
    log('tab visible → resuming video');
    video.play().catch(e => log('video.play() rejected: ' + e.message, 'err'));
  }
});

// ====== boot ======
$('btn-go').addEventListener('click', async () => {
  $('btn-go').textContent = '初始化中…';
  $('btn-go').disabled = true;
  try {
    log('--- boot start ---');
    log('flags: cube=' + FLAG_CUBE + ' nocam=' + FLAG_NOCAM + ' debug=' + FLAG_DEBUG);
    await initCamera();
    await Promise.all([initMP(), loadAvatar(), initAction()]);
    $('start').style.display = 'none';
    requestAnimationFrame(loop);
    log('--- running ---', 'ok');
  } catch (e) {
    log('BOOT FAIL: ' + (e.message || e), 'err');
    $('btn-go').textContent = '出错了，点这里查看日志';
    $('btn-go').disabled = false;
    logEl.classList.add('show');
  }
});
</script>
</body>
</html>
